<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Calculator</h1>
        <div id="container">
            <div id="screen">00</div>
            <div id="buttons">
                <div id="top-buttons">
                    <button id="plus" class="top-buttons">+</button>
                    <button id="minus" class="top-buttons">-</button>
                    <button id="multiply" class="top-buttons">*</button>
                    <button id="divide" class="top-buttons">/</button>
                </div>
                <div id="numbers">
                    <div id="top-nums">
                        <button id="seven" class="numbers">7</button>
                        <button id="eight" class="numbers">8</button>
                        <button id="nine" class="numbers">9</button>
                    </div>
                    <div id="mid-nums">
                        <button id="four" class="numbers">4</button>
                        <button id="five" class="numbers">5</button>
                        <button id="six" class="numbers">6</button>
                    </div>
                    <div id="btm-nums">
                        <button id="one" class="numbers">1</button>
                        <button id="two" class="numbers">2</button>
                        <button id="three" class="numbers">3</button>
                    </div>
                    <div id="btm-buttons">
                        <button id="zero" class="btm-buttons">0</button>
                        <button id="equals" class="btm-buttons">=</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
