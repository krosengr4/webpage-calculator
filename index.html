<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <h1>Calculator</h1>
        <div id="container">
            <div id="screen">00</div>
            <div id="buttons">
                <div id="top-buttons">
                    <button id="+" class="top-buttons">+</button>
                    <button id="-" class="top-buttons">-</button>
                    <button id="*" class="top-buttons">*</button>
                    <button id="/" class="top-buttons">/</button>
                </div>
                <div id="numbers">
                    <div id="top-nums">
                        <button id="7" class="numbers">7</button>
                        <button id="8" class="numbers">8</button>
                        <button id="9" class="numbers">9</button>
                    </div>
                    <div id="mid-nums">
                        <button id="4" class="numbers">4</button>
                        <button id="5" class="numbers">5</button>
                        <button id="6" class="numbers">6</button>
                    </div>
                    <div id="btm-nums">
                        <button id="1" class="numbers">1</button>
                        <button id="2" class="numbers">2</button>
                        <button id="3" class="numbers">3</button>
                    </div>
                    <div id="btm-buttons">
                        <button id="0" class="btm-buttons">0</button>
                        <button id="=" class="btm-buttons">=</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
